    <polygon points="32,9 31.6,10.4 31.6,32.4 32,32.8 44.5,25.4" fill-opacity="0.6"/>
    <polygon points="32,9 19.5,25.4 32,32.8 32,22.2"/>
    <polygon points="32,35.2 31.8,35.5 31.8,44.6 32,55 44.5,27.7" fill-opacity="0.6"/>
    <polygon points="32,55 32,35.2 19.5,27.7"/>
