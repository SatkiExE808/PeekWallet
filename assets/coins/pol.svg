<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- POL (Polygon Ecosystem Token, post-2024 rebrand). The new mark
       is a single offset hexagon with a smaller triangular notch cut
       from the upper-left, on a deep purple ground. We approximate
       with a white hexagon path on purple — close enough to be
       recognizable at the avatar size; the canonical PNG from
       CoinGecko's CDN loads over the network as the primary, this
       is the offline fallback. -->
  <circle cx="32" cy="32" r="32" fill="#7B3FE4"/>
  <g fill="#FFFFFF">
    <polygon points="32,14 46,22 46,38 32,46 18,38 18,22"/>
    <polygon points="32,14 24,18.6 32,23.2 40,18.6" fill="#7B3FE4"/>
  </g>
</svg>
