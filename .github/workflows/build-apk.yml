# Build the Flutter Android APK and attach it to a rolling `latest`
# release so the user can sideload by visiting /releases/latest on
# their phone.
#
# Triggers:
#   - Every push to `main`        → rebuilds + overwrites `latest`
#   - Version tag push (vX.Y.Z)   → permanent versioned release
#   - Manual run                  → same as a push to main
#
# Signing: uses a persistent keystore stashed in repo secrets so APKs
# from successive builds upgrade cleanly over each other. Required
# secrets (Settings → Secrets and variables → Actions):
#
#   ANDROID_KEYSTORE_BASE64    base64-encoded keystore (.jks/.keystore)
#                              $ base64 -i peek-release.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD  keystore password
#   ANDROID_KEY_ALIAS          key alias inside the keystore
#   ANDROID_KEY_PASSWORD       key password (often equal to keystore pw)
#
# Falls back to a throwaway generated keystore (with all secrets unset)
# so the workflow still runs on forks and PRs that don't have access
# to the secrets. APKs from those runs are NOT installable over a
# real release build (signature mismatch) — fine for smoke-testing.
# See docs/building.md for the one-time keystore-generation steps.

name: Build & release APK

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Unit tests
        run: flutter test

      - name: Cache monero_c prebuilt bundle
        id: cache-monero
        uses: actions/cache@v4
        with:
          path: .cache/monero_c
          # Bump when scripts/prepare_monero.sh's VERSION changes.
          key: monero_c-v0.18.4.6-RC1

      - name: Fetch monero_c native libraries
        run: ./scripts/prepare_monero.sh

      - name: Decode persistent release keystore (if secrets available)
        id: ks
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          if [ -n "$KS_B64" ] && [ -n "$KS_PWD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PWD" ]; then
            echo "$KS_B64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
          storePassword=$KS_PWD
          keyPassword=$KEY_PWD
          keyAlias=$KEY_ALIAS
          storeFile=release.keystore
          EOF
            echo "persistent=true" >> "$GITHUB_OUTPUT"
            echo "Using persistent release keystore (stable signature)"
          else
            # Fallback for forks / PRs without secret access.
            # Throwaway keystore — APK still installs, but signature
            # changes every build so installs can't upgrade in place.
            keytool -genkey -v \
              -keystore android/app/release.keystore \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias peek-dev \
              -storepass peek-dev-password -keypass peek-dev-password \
              -dname "CN=PeekWallet Dev, O=Self, C=US"
            cat > android/key.properties <<EOF
          storePassword=peek-dev-password
          keyPassword=peek-dev-password
          keyAlias=peek-dev
          storeFile=release.keystore
          EOF
            echo "persistent=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Using throwaway keystore — signature won't match official releases"
          fi

      - name: Build release APK
        # BUILD_TIME is consumed by lib/util/update_checker.dart to
        # decide whether the running APK predates the latest GitHub
        # release. We embed the *current* UTC timestamp (the moment
        # this build started), NOT the commit author time — the
        # release's published_at is always ~minutes after the
        # underlying commit, so commit-time comparison would
        # phantom-flag the just-published APK as "update available"
        # against itself.
        run: |
          BUILD_TIME=$(date -u +%FT%TZ)
          flutter build apk --release --dart-define=BUILD_TIME="$BUILD_TIME"

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find build/app/outputs/flutter-apk -name '*-release.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No release APK found"
            ls -R build/app/outputs/ || true
            exit 1
          fi
          cp "$APK" peek-wallet.apk
          echo "path=peek-wallet.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: peek-wallet-apk
          path: peek-wallet.apk
          retention-days: 30

      - name: Attach APK to versioned release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Update rolling `latest` release
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (auto)
          body: |
            🤖 Auto-built from `main` on every push.

            **Commit:** `${{ github.sha }}`
            **Build:**  #${{ github.run_number }}
            **Built:**  ${{ github.event.head_commit.timestamp || github.run_started_at }}

            Download **`peek-wallet.apk`** below and sideload to your Android device.

            ⚠️ Bundle ID is `com.vault.cryptowallet.dev` during the rewrite — installs side-by-side with the current Vault app (`com.vault.cryptowallet`). Both can coexist on the same phone.

            ${{ steps.ks.outputs.persistent == 'true' && '✓ Signed with the persistent release keystore — installs upgrade cleanly over previous builds.' || '⚠️ Throwaway keystore (no secrets available in this run). Signature won''t match other builds.' }}
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          prerelease: false
          make_latest: true
